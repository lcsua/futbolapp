name: Deploy Frontend Admin (React)

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Uncomment and update the working-directory based on your project structure
      # - name: Install dependencies
      #   run: npm ci
      #   working-directory: ./frontend-admin

      # - name: Build
      #   run: npm run build
      #   working-directory: ./frontend-admin

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "Conectado al servidor para desplegar el Frontend Admin"
